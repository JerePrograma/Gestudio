services:
  db:
    environment:
      POSTGRES_DB: ${POSTGRES_DB:?POSTGRES_DB is required}
      POSTGRES_USER: ${POSTGRES_USER:?POSTGRES_USER is required}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      TZ: ${APP_TIME_ZONE:?APP_TIME_ZONE is required}
    ports: !reset []

  backend:
    environment:
      SPRING_PROFILES_ACTIVE: remote-demo
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/${POSTGRES_DB:?POSTGRES_DB is required}
      SPRING_DATASOURCE_USERNAME: ${POSTGRES_USER:?POSTGRES_USER is required}
      SPRING_DATASOURCE_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD is required}
      SPRING_JPA_HIBERNATE_DDL_AUTO: validate
      SPRING_FLYWAY_ENABLED: ${SPRING_FLYWAY_ENABLED:-true}
      SPRING_FLYWAY_BASELINE_ON_MIGRATE: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:-false}
      SPRING_FLYWAY_BASELINE_VERSION: ${SPRING_FLYWAY_BASELINE_VERSION:-1}
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET is required}
      JWT_ISSUER: ${JWT_ISSUER:?JWT_ISSUER is required}
      JWT_AUDIENCE: ${JWT_AUDIENCE:-gestudio-web}
      JWT_ACCESS_TOKEN_TTL: ${JWT_ACCESS_TOKEN_TTL:-PT15M}
      JWT_REFRESH_TOKEN_TTL: ${JWT_REFRESH_TOKEN_TTL:-P1D}
      APP_TIME_ZONE: ${APP_TIME_ZONE:?APP_TIME_ZONE is required}
      APP_RECEIPTS_PATH: ${APP_RECEIPTS_PATH:-/app/data/receipts}
      APP_CORS_ALLOWED_ORIGINS: ${APP_CORS_ALLOWED_ORIGINS:?APP_CORS_ALLOWED_ORIGINS is required}
      APP_SCHEDULING_ENABLED: "false"
      APP_REMOTE_DEMO_PROXY_TOKEN: ${APP_REMOTE_DEMO_PROXY_TOKEN:?APP_REMOTE_DEMO_PROXY_TOKEN is required}
      APP_OBSERVABILITY_METRICS_TOKEN: ${APP_OBSERVABILITY_METRICS_TOKEN:?APP_OBSERVABILITY_METRICS_TOKEN is required}
      APP_SECURITY_BCRYPT_STRENGTH: ${APP_SECURITY_BCRYPT_STRENGTH:-12}
      APP_SECURITY_REFRESH_COOKIE_NAME: ${APP_SECURITY_REFRESH_COOKIE_NAME:-gestudio_remote_demo_refresh}
      APP_SECURITY_REFRESH_COOKIE_SECURE: "true"
      APP_SECURITY_REFRESH_COOKIE_SAME_SITE: ${APP_SECURITY_REFRESH_COOKIE_SAME_SITE:-Strict}
      APP_SECURITY_REFRESH_COOKIE_DOMAIN: ${APP_SECURITY_REFRESH_COOKIE_DOMAIN:-}
      APP_SECURITY_REFRESH_COOKIE_PATH: ${APP_SECURITY_REFRESH_COOKIE_PATH:-/api/login}
      APP_BOOTSTRAP_SUPERADMIN_ENABLED: "false"
      APP_BOOTSTRAP_SUPERADMIN_USERNAME: ""
      APP_BOOTSTRAP_SUPERADMIN_PASSWORD: ""
      APP_LOCAL_ADMIN_PASSWORD_RESET_ENABLED: "false"
      APP_LOCAL_ADMIN_PASSWORD_RESET_USERNAME: ""
      APP_LOCAL_ADMIN_PASSWORD_RESET_PASSWORD: ""
      APP_JERE_PLATFORM_STUDENT_EXPORT_ENABLED: "false"
      BACKEND_HEALTHCHECK_MODE: actuator-readiness-v1
      GESTUDIO_HOME: /app
      SERVER_PORT: ${SERVER_PORT:-8080}
      LOGGING_LEVEL_ROOT: ${LOGGING_LEVEL_ROOT:-INFO}
    ports: !override
      - "127.0.0.1:${BACKEND_PORT:-18080}:${SERVER_PORT:-8080}"

  frontend:
    profiles:
      - local-frontend-only
