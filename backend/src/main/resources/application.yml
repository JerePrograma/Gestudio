spring:
  application:
    name: Gestudio
  datasource:
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
  flyway:
    enabled: ${SPRING_FLYWAY_ENABLED:true}
    baseline-on-migrate: ${SPRING_FLYWAY_BASELINE_ON_MIGRATE:false}
    baseline-version: ${SPRING_FLYWAY_BASELINE_VERSION:1}
  jackson:
    time-zone: ${APP_TIME_ZONE:America/Argentina/Buenos_Aires}
  data:
    web:
      pageable:
        default-page-size: 50
        max-page-size: 200
  web:
    resources:
      chain:
        enabled: true
        strategy:
          content:
            enabled: true
            paths: /**
      cache:
        cachecontrol:
          cache-public: true
          max-age: 365d

server:
  port: ${SERVER_PORT:8080}
  compression:
    enabled: true
    mime-types: text/html,text/css,application/javascript,application/json,image/svg+xml,application/font-woff2

management:
  endpoints:
    web:
      base-path: /actuator
      exposure:
        include: health,prometheus
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
    prometheus:
      enabled: true
  health:
    livenessstate:
      enabled: true
    readinessstate:
      enabled: true
    mail:
      enabled: false
  metrics:
    tags:
      application: ${spring.application.name}
      profile: ${SPRING_PROFILES_ACTIVE:default}

jwt:
  issuer: ${JWT_ISSUER:gestudio-local}
  audience: ${JWT_AUDIENCE:gestudio-web}
  access-token-ttl: ${JWT_ACCESS_TOKEN_TTL:PT15M}
  refresh-token-ttl: ${JWT_REFRESH_TOKEN_TTL:P7D}

app:
  time-zone: ${APP_TIME_ZONE:America/Argentina/Buenos_Aires}
  cors-allowed-origins: ${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:8080}
  scheduling-enabled: ${APP_SCHEDULING_ENABLED:false}
  observability:
    metrics-token: ${APP_OBSERVABILITY_METRICS_TOKEN:}
  security:
    bcrypt-strength: ${APP_SECURITY_BCRYPT_STRENGTH:12}
    refresh-cookie:
      name: ${APP_SECURITY_REFRESH_COOKIE_NAME:gestudio_refresh}
      secure: ${APP_SECURITY_REFRESH_COOKIE_SECURE:true}
      same-site: ${APP_SECURITY_REFRESH_COOKIE_SAME_SITE:Strict}
      domain: ${APP_SECURITY_REFRESH_COOKIE_DOMAIN:}
      path: ${APP_SECURITY_REFRESH_COOKIE_PATH:/api/login}
  bootstrap-superadmin:
    enabled: ${APP_BOOTSTRAP_SUPERADMIN_ENABLED:false}
    username: ${APP_BOOTSTRAP_SUPERADMIN_USERNAME:}
    password: ${APP_BOOTSTRAP_SUPERADMIN_PASSWORD:}
  local-admin-password-reset:
    enabled: ${APP_LOCAL_ADMIN_PASSWORD_RESET_ENABLED:false}
    username: ${APP_LOCAL_ADMIN_PASSWORD_RESET_USERNAME:}
    password: ${APP_LOCAL_ADMIN_PASSWORD_RESET_PASSWORD:}
  jere-platform-student-export:
    enabled: ${APP_JERE_PLATFORM_STUDENT_EXPORT_ENABLED:false}
    organization-id: ${APP_JERE_PLATFORM_STUDENT_EXPORT_ORGANIZATION_ID:}
    tenant-id: ${APP_JERE_PLATFORM_STUDENT_EXPORT_TENANT_ID:}
    current-secret: ${APP_JERE_PLATFORM_STUDENT_EXPORT_CURRENT_SECRET:}
    page-size: ${APP_JERE_PLATFORM_STUDENT_EXPORT_PAGE_SIZE:1000}

logging:
  pattern:
    console: "%d{yyyy-MM-dd'T'HH:mm:ss.SSSXXX} level=%-5level thread=%thread logger=%logger{36} requestId=%X{requestId:-} message=%replace(%msg){'[\\r\\n\\t]','_'}%n"
  level:
    root: ${LOGGING_LEVEL_ROOT:INFO}
    org.springframework.web: INFO
    org.springframework.security: INFO
    org.springframework.mail: ERROR
    jakarta.mail: ERROR
    org.eclipse.angus.mail: ERROR
    com.sun.mail: ERROR
