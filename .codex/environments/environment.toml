# THIS IS AUTOGENERATED. DO NOT EDIT MANUALLY
version = 1
name = "gestudio"

[setup]
script = ""

[setup.win32]
script = '''
$ErrorActionPreference = "Stop"
Set-StrictMode -Version Latest

function Assert-Command {
    param(
        [Parameter(Mandatory = $true)]
        [string] $Name
    )

    if (-not (Get-Command $Name -ErrorAction SilentlyContinue)) {
        throw "Falta '$Name' en PATH. Instalalo o corregí la variable PATH antes de crear el worktree."
    }
}

@(
    "git",
    "node",
    "npm",
    "docker"
) | ForEach-Object {
    Assert-Command $_
}

Write-Host "Verificando Java..."
if ([string]::IsNullOrWhiteSpace($env:JAVA_HOME)) {
    throw "JAVA_HOME no está definido. Gestudio requiere un JDK 21."
}
$javaExe = Join-Path $env:JAVA_HOME "bin\java.exe"
if (-not (Test-Path -LiteralPath $javaExe -PathType Leaf)) {
    throw "JAVA_HOME no contiene bin\java.exe: $env:JAVA_HOME"
}
$javaVersion = (& $javaExe -version 2>&1 | Select-Object -First 1)
Write-Host $javaVersion

if ("$javaVersion" -notmatch 'version "21(\.|")') {
    throw "Gestudio requiere JDK 21. Versión detectada: $javaVersion"
}

Write-Host "Preparando dependencias Maven..."

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" -q -DskipTests dependency:go-offline
    }
    else {
        throw "Falta backend\mvnw.cmd. No se usa Maven global como fallback."
    }

    if ($LASTEXITCODE -ne 0) {
        throw "No se pudieron resolver las dependencias Maven. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Write-Host "Preparando dependencias del frontend..."

Push-Location "frontend"
try {
    if (Test-Path ".\package-lock.json") {
        & npm ci
    }
    else {
        throw "Falta frontend\package-lock.json. No se usa npm install como fallback."
    }

    if ($LASTEXITCODE -ne 0) {
        throw "Falló la instalación del frontend. Código: $LASTEXITCODE"
    }
}
finally {
    Pop-Location
}

Write-Host ""
Write-Host "Entorno Gestudio preparado correctamente."
Write-Host "Repositorio: $((Get-Location).Path)"
Write-Host "Java: $javaVersion"
Write-Host "Node: $(& node --version)"
Write-Host "npm: $(& npm --version)"
'''

[cleanup]
script = ""

[cleanup.win32]
script = '''
$ErrorActionPreference = "Stop"
& ".\scripts\codex\cleanup.ps1"
exit $LASTEXITCODE
'''

[[actions]]
name = "Estado"
icon = "tool"
command = '''
& ".\scripts\codex\status.ps1"
exit $LASTEXITCODE
'''

[[actions]]
name = "Backend verify"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" clean verify
    }
    else {
        throw "Falta backend\mvnw.cmd."
    }

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Frontend check"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "frontend"
try {
    & npm audit

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }

    & npm audit --omit=dev

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }

    & npm run lint

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }

    & npm test

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }

    & npm run build

    if ($LASTEXITCODE -ne 0) {
        exit $LASTEXITCODE
    }
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Validar todo"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"
& ".\scripts\codex\validate.ps1" -Scope All
exit $LASTEXITCODE
'''

[[actions]]
name = "DB local"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

docker compose up -d db

if ($LASTEXITCODE -ne 0) {
    exit $LASTEXITCODE
}

docker compose ps
'''

[[actions]]
name = "Backend dev"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "backend"
try {
    if (Test-Path ".\mvnw.cmd") {
        & ".\mvnw.cmd" spring-boot:run
    }
    else {
        & mvn spring-boot:run
    }

    exit $LASTEXITCODE
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Frontend dev"
icon = "tool"
command = '''
$ErrorActionPreference = "Stop"

Push-Location "frontend"
try {
    & npm run dev
    exit $LASTEXITCODE
}
finally {
    Pop-Location
}
'''

[[actions]]
name = "Detener Docker"
icon = "tool"
command = '''
docker compose down --remove-orphans
exit $LASTEXITCODE
'''
