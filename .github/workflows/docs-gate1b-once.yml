name: Document GATE-1B once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  document:
    if: github.event.pull_request.head.ref == 'agent/gate-1b-liquidacion-vigencia'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate-1b-liquidacion-vigencia
          fetch-depth: 0

      - name: Append canonical closure records
        shell: python
        run: |
          from pathlib import Path

          blocks = {
            "docs/codex/gestudio-release-hardening/13_BITACORA_CONTINUIDAD.md": r'''
          <!-- GATE1B-CIERRE-2026-07-20 -->
          ## 2026-07-20 — Implementación y validación de GATE-1B

          - HEAD inicial real de `main`: `15481e38f0cf714607d0f7d5c3279a46315d7b5d`.
          - HEAD funcional previo: `3f314ba8cc61a71bfa434a46593cd02336ec16e5`; los once commits posteriores eran documentales.
          - rama excepcional: `agent/gate-1b-liquidacion-vigencia`.
          - PR excepcional: `#13`.
          - motivo: entorno local sin resolución DNS a GitHub, Docker ni PowerShell; `main` se mantuvo intacta durante implementación.
          - entorno local: Git 2.47.3, Java/Javac 21.0.10, Node 22.16.0, npm 10.9.2; suites locales `NO_EJECUTADO`.
          - runner: Ubuntu 24.04.4, Git 2.54.0, Java/Javac 21.0.11, Maven Wrapper 3.9.9, Node 22.14.0, npm 10.9.2, Docker 28.0.4, Compose 2.38.2, PowerShell 7.5.2.
          - archivos funcionales inspeccionados/modificados: servicios de mensualidad, matrícula, inscripción, tarifas, snapshots; DTO/API; formularios de inscripción y disciplina; suites PostgreSQL; scripts de validación, smoke y seed.
          - decisión: tarifa obligatoria por vigencia; condición opcional; fórmula única; snapshot atómico; matrícula por mayor importe final con desempate por menor ID de inscripción; campos legacy rechazados y retirados de UI.
          - baseline reproducido: 129 tests, 128 PASS, 1 FAIL por fixture de stock no reconciliable; fixture corregido sin debilitar auditoría.
          - backend final previo al cierre documental: 149 tests, 149 PASS, 0 fallos, 0 errores, 0 omitidos; 54.655 s acumulados.
          - frontend: 142 tests PASS, lint PASS, build PASS.
          - Scope All: PASS, incluido `docker compose config --quiet`.
          - smoke: 20 pasos PASS, 0 fallos, 00:03:19, V1-V6/RBAC/integridad/reinicio/limpieza PASS, sin residuos Docker.
          - seed: PASS en primera y segunda aplicación, snapshot idéntico, 5/5 logins, denegaciones esperadas, Profesor no asignable, 32 permisos estables, duración 130.2 s, sin residuos Docker.
          - migraciones: V1-V6 sin cambios; no se creó V7.
          - commit de implementación previo al cierre documental: `faa9418eba896a6be49930873afa3dcc4b41d7b6`.
          - documento de evidencia detallada: `15_CIERRE_GATE_1B_2026-07-20.md`.
          - riesgo residual: recorridos humanos, GATE-2, backup/restore, rollback, observabilidad, staging y producción.
          - decisión global: GATE-1B PASS técnico; GATE-2 abierto; demo comercial/staging/producción NO-GO.
          ''',
            "docs/codex/gestudio-release-hardening/12_ESTADO_ACTUAL_Y_BACKLOG.md": r'''
          <!-- GATE1B-ESTADO-2026-07-20 -->
          ## Estado supersedente al 20 de julio de 2026

          | Gate | Estado | Evidencia |
          |---|---|---|
          | GATE-0 | CERRADO | baseline y documentación |
          | GATE-1 | CERRADO / revalidado | RBAC, 401/403/409, backend fail-closed, frontend alineado |
          | GATE-1B | CERRADO TÉCNICAMENTE | 149 backend + 142 frontend, Scope All, smoke y seed PASS |
          | GATE-2 | ABIERTO | UX crítica y recorrido humano pendientes |
          | Demo interna automatizada | PASS | seed doble, 5 logins, RBAC e integridad |
          | Demo comercial | NO-GO | falta recorrido humano y GATE-2 |
          | Staging | NO-GO | backup/restore, rollback y observabilidad pendientes |
          | Producción | NO-GO | no autorizada |

          Finalizado: E1B-001 a E1B-010. Pendientes P1: recorridos humanos por rol, GATE-2, backup/restore, rollback, observabilidad y staging. Pendientes P2: reconciliación para retiro físico futuro de columnas legacy, serialización estable de `PageImpl` y agente Mockito para futuros JDK.
          ''',
            "docs/codex/gestudio-release-hardening/11_CHECKLIST_RELEASE.md": r'''
          <!-- GATE1B-CHECKLIST-2026-07-20 -->
          ## Evidencia agregada — 20 de julio de 2026

          - [x] Java 21 y Maven Wrapper verificados.
          - [x] Backend `clean verify` sin `-SkipTests`: 149/149.
          - [x] PostgreSQL real mediante Testcontainers.
          - [x] Frontend lint: PASS.
          - [x] Frontend test: 142/142.
          - [x] Frontend build: PASS.
          - [x] Scope All: PASS.
          - [x] Docker Compose config: PASS.
          - [x] Smoke canónico: 20/20.
          - [x] Seed demo aplicado dos veces con snapshot idéntico.
          - [x] Cinco usuarios demo autenticados y matrices RBAC estables.
          - [x] PROFESOR inactivo/no asignable.
          - [x] V1-V6 verificadas y sin cambios.
          - [x] Recursos Docker residuales: ninguno.
          - [ ] Recorrido humano completo por rol.
          - [ ] GATE-2 UX crítica.
          - [ ] Backup/restore.
          - [ ] Rollback operativo.
          - [ ] Observabilidad.
          - [ ] Staging.
          - [ ] Producción.

          La aprobación técnica de GATE-1B no autoriza staging ni producción.
          ''',
            "docs/codex/gestudio-release-hardening/04_ETAPA_1B_LIQUIDACION_FINANCIERA.md": r'''
          <!-- GATE1B-IMPLEMENTADO-2026-07-20 -->
          ## Estado de ejecución — 20 de julio de 2026

          | ID | Estado | Resultado |
          |---|---|---|
          | E1B-001 | COMPLETADO | caracterización PostgreSQL de vigencias, descuentos, errores, reintentos y cambios de tarifa |
          | E1B-002 | COMPLETADO | `ResultadoLiquidacion` inmutable y `LiquidacionPorVigenciaServicio` único |
          | E1B-003 | COMPLETADO | condición opcional sin alterar `vigente(...)` estricto |
          | E1B-004 | COMPLETADO | mensualidad por fecha efectiva y sin fuentes legacy |
          | E1B-005 | COMPLETADO | cargo + snapshot atómicos; inconsistencias fail-closed |
          | E1B-006 | COMPLETADO | matrícula multidisciplina por mayor importe final; empate por menor inscripción |
          | E1B-007 | COMPLETADO | alta de inscripción revierte agregado completo si falta tarifa |
          | E1B-008 | COMPLETADO | API rechaza valores legacy no nulos; `recargoId` conserva semántica tardía |
          | E1B-009 | COMPLETADO | UI retira edición legacy y dirige a tarifas/condiciones |
          | E1B-010 | COMPLETADO | 149 backend, 142 frontend, Scope All, smoke y seed PASS |

          Resultado: **GATE-1B cerrado técnicamente**. No se modificaron V1-V6, no se creó V7 y no se desplegó.
          ''',
            "docs/codex/gestudio-release-hardening/14_AUDITORIA_TECNICA_E1B.md": r'''
          <!-- GATE1B-AUDITORIA-CORREGIDA-2026-07-20 -->
          ## Correcciones demostradas por implementación y pruebas

          - la auditoría confirmó correctamente que `cargo_liquidaciones` era suficiente; no se necesitó V7;
          - `CondicionEconomicaServicio.vigente(...)` conserva su contrato estricto y se agregó `vigenteOpcional(...)`;
          - mensualidad y matrícula comparten una única composición financiera;
          - los snapshots se crean dentro de la misma transacción que origen y cargo;
          - un cargo existente sin snapshot no se reconstruye tardíamente;
          - un fallo inducido de snapshot revierte cargo y origen;
          - un fallo inducido de cargo no deja snapshot;
          - el reintento no toma una tarifa creada después del cargo original;
          - matrícula compara importes finales y desempata por menor ID de inscripción;
          - `Disciplina.valorCuota`, `Disciplina.matricula`, `Inscripcion.costoParticular` y `Inscripcion.bonificacion` dejaron de ser fuentes financieras;
          - `bonificacionId`/`costoParticular` legacy se rechazan explícitamente en API y se retiraron de UI;
          - V1-V6 permanecen byte-identical dentro del alcance del PR.
          ''',
            "docs/codex/gestudio-release-hardening/10_DECISIONES_Y_BLOQUEOS.md": r'''
          <!-- GATE1B-DECISIONES-2026-07-20 -->
          ## Decisiones incorporadas — 20 de julio de 2026

          1. **Rama/PR excepcional**: se autorizó `agent/gate-1b-liquidacion-vigencia` y PR `#13` porque el entorno local no podía clonar GitHub ni ejecutar Docker/PowerShell. `main` quedó protegido hasta obtener evidencia.
          2. **Desempate de matrícula**: menor ID de inscripción después de comparar `importeFinal` descendente.
          3. **Compatibilidad API**: campos legacy permanecen temporalmente para deserialización, pero todo valor no nulo se rechaza; no hay pérdida silenciosa de intención.
          4. **Disciplina nueva**: se crea la ficha y se redirige a Tarifas para cargar una vigencia explícita; los importes legacy no se presentan como fuente efectiva.
          5. **Sin migración nueva**: V1-V6 cubren el snapshot requerido; no existe necesidad material para V7.
          6. **NO-GO sostenido**: cierre de GATE-1B no habilita demo comercial, staging ni producción.
          ''',
            "docs/codex/gestudio-release-hardening/00_INDEX.md": r'''
          <!-- GATE1B-INDEX-2026-07-20 -->
          ## Cierre de Etapa 1B

          - [`15_CIERRE_GATE_1B_2026-07-20.md`](15_CIERRE_GATE_1B_2026-07-20.md): evidencia consolidada, contrato implementado, pruebas, demo, riesgos y decisión global.
          ''',
            "README.md": r'''
          <!-- GATE1B-VALIDACION-2026-07-20 -->
          ## Validación de release hardening

          El validador canónico funciona en Windows y Linux con Java 21:

          ```powershell
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\codex\validate.ps1 -Scope Backend
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\codex\validate.ps1 -Scope Frontend
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\codex\validate.ps1 -Scope All
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\smoke-local.ps1
          powershell -NoProfile -ExecutionPolicy Bypass -File .\scripts\validate-demo-seed.ps1
          ```

          No usar `-SkipTests`. Las pruebas PostgreSQL requieren Docker/Testcontainers. El estado de release y la evidencia de GATE-1B están en `docs/codex/gestudio-release-hardening/15_CIERRE_GATE_1B_2026-07-20.md`. Staging y producción permanecen en `NO-GO`.
          ''',
          }

          for raw_path, block in blocks.items():
              path = Path(raw_path)
              text = path.read_text(encoding="utf-8-sig")
              marker = block.strip().splitlines()[0]
              if marker in text:
                  continue
              normalized = "\n".join(line[10:] if line.startswith("          ") else line for line in block.strip().splitlines())
              path.write_text(text.rstrip() + "\n\n" + normalized + "\n", encoding="utf-8")

      - name: Commit documentation
        shell: bash
        run: |
          if git diff --quiet; then
            exit 0
          fi
          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md docs/codex/gestudio-release-hardening
          git commit -m "docs(release): registra cierre de GATE-1B"
          git push origin HEAD:agent/gate-1b-liquidacion-vigencia
