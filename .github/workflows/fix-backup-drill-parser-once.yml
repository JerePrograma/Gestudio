name: Fix backup drill parser once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'agent/ops-backup-restore-docs'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
        with:
          ref: agent/ops-backup-restore-docs
          fetch-depth: 0

      - name: Parse only the returned numeric id
        shell: python
        run: |
          from pathlib import Path

          path = Path('scripts/ops/verify-backup-restore.ps1')
          lines = path.read_text(encoding='utf-8-sig').splitlines()
          for index, line in enumerate(lines):
              if '$studentId = Invoke-Sql' not in line or 'INSERT INTO alumnos' not in line:
                  continue
              indent = line[:len(line) - len(line.lstrip())]
              replacement = [
                  line.replace('$studentId =', '$studentResult =', 1),
                  indent + '$studentId = (($studentResult -split "`r?`n") | Select-Object -First 1).Trim()',
                  indent + "Assert-True -Condition ($studentId -match '^[0-9]+$') -Message \"La inserción no devolvió un ID numérico: $studentResult\"",
              ]
              if index + 1 < len(lines) and 'No se insertó el alumno sintético' in lines[index + 1]:
                  lines[index:index + 2] = replacement
              else:
                  lines[index:index + 1] = replacement
              path.write_text('\n'.join(lines) + '\n', encoding='utf-8')
              break
          else:
              if not any('$studentResult = Invoke-Sql' in line for line in lines):
                  raise SystemExit('No se encontró la inserción de alumno')

      - name: Commit fix
        shell: bash
        run: |
          if git diff --quiet -- scripts/ops/verify-backup-restore.ps1; then
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/ops/verify-backup-restore.ps1
          git commit -m "fix(ops): normaliza id devuelto por psql"
          git push origin HEAD:agent/ops-backup-restore-docs
