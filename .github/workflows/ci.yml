name: CI Gestudio

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: gestudio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify backend
        working-directory: backend
        env:
          GESTUDIO_HOME: ${{ github.workspace }}
        run: bash ./mvnw -B -ntp clean verify

      - name: Set up Node 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Audit all frontend dependencies
        working-directory: frontend
        run: |
          npm audit
          npm audit --omit=dev

      - name: Validate frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://example.invalid/api
          VITE_APP_TIME_ZONE: America/Argentina/Buenos_Aires
        run: |
          npm run lint
          npm test
          npm run build
          test -f dist/_headers
          grep -F "connect-src 'self' https://example.invalid;" dist/_headers
          ! grep -F '__GESTUDIO_API_ORIGIN__' dist/_headers

      - name: Validate local Compose
        run: docker compose config --quiet

      - name: Validate production Compose
        env:
          POSTGRES_DB: gestudio_ci
          POSTGRES_USER: gestudio_ci
          POSTGRES_PASSWORD: ci-not-a-production-secret
          BACKEND_IMAGE: example.invalid/gestudio-backend:${{ github.sha }}
          FRONTEND_IMAGE: example.invalid/gestudio-frontend:${{ github.sha }}
          JWT_SECRET: ci-only-jwt-secret-with-at-least-32-characters
          JWT_ISSUER: gestudio-ci
          JWT_ACCESS_TOKEN_TTL: PT15M
          JWT_REFRESH_TOKEN_TTL: P7D
          SPRING_MAIL_HOST: smtp.example.invalid
          SPRING_MAIL_PORT: "587"
          SPRING_MAIL_USERNAME: ci
          SPRING_MAIL_PASSWORD: ci-not-a-production-secret
          SPRING_MAIL_IMAP_HOST: imap.example.invalid
          SPRING_MAIL_IMAP_PORT: "993"
          SPRING_MAIL_IMAP_USERNAME: ci
          SPRING_MAIL_IMAP_PASSWORD: ci-not-a-production-secret
          APP_TIME_ZONE: America/Argentina/Buenos_Aires
          APP_CORS_ALLOWED_ORIGINS: https://app.example.invalid
          APP_OBSERVABILITY_METRICS_TOKEN: ci-only-independent-metrics-token
          VITE_API_BASE_URL: https://api.example.invalid/api
          VITE_APP_TIME_ZONE: America/Argentina/Buenos_Aires
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

      - name: Validate remote demo contracts
        env:
          POSTGRES_PASSWORD: ci-remote-database-password
          JWT_SECRET: ci-remote-jwt-secret-with-at-least-32-characters
          APP_CORS_ALLOWED_ORIGINS: https://app.example.invalid
          APP_OBSERVABILITY_METRICS_TOKEN: ci-remote-independent-metrics-token
        run: |
          set -euo pipefail
          git check-ignore --no-index --quiet .env.remote-demo
          test -f scripts/remote-demo/validate-demo-seed.sql
          grep -F "= 914" scripts/remote-demo/validate-demo-seed.sql
          remote_config="$(mktemp)"
          trap 'rm -f "$remote_config"' EXIT
          docker compose \
            --profile local-frontend-only \
            --env-file .env.remote-demo.example \
            -f docker-compose.yml \
            -f docker-compose.remote-demo.yml \
            -p gestudio-remote-demo-ci \
            config --format json > "$remote_config"
          test "$(jq -r '(.services.db.ports // []) | length' "$remote_config")" = "0"
          test "$(jq -r '.services.backend.ports | length' "$remote_config")" = "1"
          test "$(jq -r '.services.backend.ports[0].host_ip' "$remote_config")" = "127.0.0.1"
          test "$(jq -r '.services.backend.ports[0].published' "$remote_config")" = "18080"
          test "$(jq -r '.services.backend.environment.SPRING_PROFILES_ACTIVE' "$remote_config")" = "remote-demo"
          test "$(jq -r '.services.backend.environment.APP_SECURITY_REFRESH_COOKIE_SECURE' "$remote_config")" = "true"
          test "$(jq -r '.services.frontend.profiles[0]' "$remote_config")" = "local-frontend-only"
          pwsh -NoProfile -Command '
            $paths = @(
              (Resolve-Path "./scripts/demo-remote.ps1").Path
            ) + @(
              Get-ChildItem "./scripts/remote-demo" -Filter "*.ps1" -File |
                Sort-Object FullName |
                ForEach-Object FullName
            )
            foreach ($path in $paths) {
              $tokens = $null
              $errors = $null
              [void][System.Management.Automation.Language.Parser]::ParseFile(
                $path,
                [ref] $tokens,
                [ref] $errors
              )
              if (@($errors).Count -gt 0) {
                Write-Host "Errores de parser en $path"
                $errors | Format-List | Out-Host
                exit 1
              }
            }
          '

  remote-demo-powershell:
    runs-on: windows-latest
    timeout-minutes: 10

    steps:
      - name: Checkout verified SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Parse remote demo scripts with Windows PowerShell 5.1
        shell: powershell
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            (Resolve-Path '.\scripts\demo-remote.ps1').Path
          ) + @(
            Get-ChildItem '.\scripts\remote-demo' -Filter '*.ps1' -File |
              Sort-Object FullName |
              ForEach-Object FullName
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $path,
              [ref] $tokens,
              [ref] $errors
            )
            if (@($errors).Count -gt 0) {
              Write-Host "Errores de parser en $path"
              $errors | Format-List | Out-Host
              exit 1
            }
          }

      - name: Parse remote demo scripts with PowerShell 7
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $paths = @(
            (Resolve-Path '.\scripts\demo-remote.ps1').Path
          ) + @(
            Get-ChildItem '.\scripts\remote-demo' -Filter '*.ps1' -File |
              Sort-Object FullName |
              ForEach-Object FullName
          )
          foreach ($path in $paths) {
            $tokens = $null
            $errors = $null
            [void][System.Management.Automation.Language.Parser]::ParseFile(
              $path,
              [ref] $tokens,
              [ref] $errors
            )
            if (@($errors).Count -gt 0) {
              Write-Host "Errores de parser en $path"
              $errors | Format-List | Out-Host
              exit 1
            }
          }

  build-images:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout verified SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build backend image gate
        run: |
          compose_sha="$(sha256sum docker-compose.yml | cut -d' ' -f1)"
          docker build --pull \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg COMPOSE_SHA="$compose_sha" \
            --build-arg SOURCE_SHA="$(git rev-parse HEAD:backend)" \
            -t gestudio-backend:${{ github.sha }} \
            ./backend

      - name: Build frontend image gate
        run: |
          compose_sha="$(sha256sum docker-compose.yml | cut -d' ' -f1)"
          docker build --pull \
            --build-arg VITE_API_BASE_URL=https://example.invalid/api \
            --build-arg VITE_APP_TIME_ZONE=America/Argentina/Buenos_Aires \
            --build-arg VCS_REF="$GITHUB_SHA" \
            --build-arg COMPOSE_SHA="$compose_sha" \
            --build-arg SOURCE_SHA="$(git rev-parse HEAD:frontend)" \
            -t gestudio-frontend:${{ github.sha }} \
            ./frontend

      - name: Validate image metadata and frontend endpoint
        run: |
          set -euo pipefail
          compose_sha="$(sha256sum docker-compose.yml | cut -d' ' -f1)"
          expected_flyway="$(find backend/src/main/resources/db/migration -maxdepth 1 -type f -name 'V*__*.sql' -printf '%f\n' | sed -E 's/^V([0-9]+)__.*/\1/' | sort -n | tail -n 1)"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' gestudio-backend:${{ github.sha }})" = "$GITHUB_SHA"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.gestudio.compose.sha256" }}' gestudio-backend:${{ github.sha }})" = "$compose_sha"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.gestudio.source.sha256" }}' gestudio-backend:${{ github.sha }})" = "$(git rev-parse HEAD:backend)"
          test "$(docker run --rm --network none --entrypoint cat gestudio-backend:${{ github.sha }} /app/build-metadata/flyway-latest)" = "$expected_flyway"
          test "$(docker run --rm --network none --entrypoint cat gestudio-backend:${{ github.sha }} /app/build-metadata/health-contract)" = "actuator-readiness-v1"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.opencontainers.image.revision" }}' gestudio-frontend:${{ github.sha }})" = "$GITHUB_SHA"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.gestudio.compose.sha256" }}' gestudio-frontend:${{ github.sha }})" = "$compose_sha"
          test "$(docker image inspect --format '{{ index .Config.Labels "org.gestudio.source.sha256" }}' gestudio-frontend:${{ github.sha }})" = "$(git rev-parse HEAD:frontend)"
          frontend_id="$(docker create gestudio-frontend:${{ github.sha }})"
          trap 'docker rm -f "$frontend_id" >/dev/null 2>&1 || true' EXIT
          docker cp "$frontend_id:/usr/share/nginx/html" /tmp/gestudio-frontend-html
          ! grep -R -F -l 'http://localhost:8080' /tmp/gestudio-frontend-html
          test -f /tmp/gestudio-frontend-html/_headers
          ! grep -F '__GESTUDIO_API_ORIGIN__' /tmp/gestudio-frontend-html/_headers

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout verified SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run isolated canonical smoke
        shell: pwsh
        run: ./scripts/smoke-local.ps1
