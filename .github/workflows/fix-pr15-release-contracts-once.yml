name: Fix PR15 release contracts once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feature/signed-student-source-export-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: feature/signed-student-source-export-v1
          fetch-depth: 0

      - name: Reconcile V7 gates and current status
        shell: python
        run: |
          from pathlib import Path

          def replace_once(path: Path, old: str, new: str) -> None:
              text = path.read_text(encoding="utf-8-sig")
              if old not in text:
                  if new in text:
                      return
                  raise SystemExit(f"No se encontró anclaje en {path}: {old[:100]!r}")
              path.write_text(text.replace(old, new, 1), encoding="utf-8")

          smoke = Path("scripts/smoke-local.ps1")
          replacements = [
              ('-Expected "6" -Message "Flyway no aplico V1-V6"', '-Expected "7" -Message "Flyway no aplico V1-V7"'),
              ('WHERE version = \'6\' AND success") -Expected "1" -Message "Flyway V6 no esta aplicada"', 'WHERE version = \'7\' AND success") -Expected "1" -Message "Flyway V7 no esta aplicada"'),
              ('version::int NOT BETWEEN 1 AND 6', 'version::int NOT BETWEEN 1 AND 7'),
              ('version::int BETWEEN 1 AND 6 ORDER BY version::int', 'version::int BETWEEN 1 AND 7 ORDER BY version::int'),
              ('$v6Checksum = @($flywayChecksums -split "`r?`n" | Where-Object { $_ -match \'^V6\\|-?\\d+$\' })', '$v7Checksum = @($flywayChecksums -split "`r?`n" | Where-Object { $_ -match \'^V7\\|-?\\d+$\' })'),
              ('$v6Checksum.Count -Expected 1 -Message "Flyway V6 no tiene un checksum registrado"', '$v7Checksum.Count -Expected 1 -Message "Flyway V7 no tiene un checksum registrado"'),
              ('Flyway checksums V1-V6:', 'Flyway checksums V1-V7:'),
              ('Pass "Flyway V1-V6 y matriz RBAC"', 'Pass "Flyway V1-V7 y matriz RBAC"'),
          ]
          smoke_text = smoke.read_text(encoding="utf-8-sig")
          for old, new in replacements:
              if old not in smoke_text:
                  if new in smoke_text:
                      continue
                  raise SystemExit(f"No se encontró anclaje smoke: {old}")
              smoke_text = smoke_text.replace(old, new, 1)
          smoke.write_text(smoke_text, encoding="utf-8")

          seed = Path("scripts/gestudio_demo_seed_full.sql")
          replace_once(seed,
              '-- Seed manual, sintético y descartable para validar Gestudio después de V1..V6.',
              '-- Seed manual, sintético y descartable para validar Gestudio después de V1..V7.')
          replace_once(seed,
              "        'notificaciones'\n",
              "        'notificaciones',\n        'jere_platform_student_export_snapshots', 'jere_platform_student_export_pages'\n")
          replace_once(seed,
              '    IF (SELECT count(*) FROM public.flyway_schema_history WHERE success) <> 6',
              '    IF (SELECT count(*) FROM public.flyway_schema_history WHERE success) <> 7')
          replace_once(seed,
              "            WHERE version = '6'\n              AND success\n              AND script = 'V6__rbac_permission_catalog_and_base_roles.sql'",
              "            WHERE version = '7'\n              AND success\n              AND script = 'V7__jere_platform_student_source_exports.sql'")
          replace_once(seed,
              "        RAISE EXCEPTION 'El historial Flyway no coincide con V1..V6 productivas';",
              "        RAISE EXCEPTION 'El historial Flyway no coincide con V1..V7 productivas';")

          readme = Path("README.md")
          replace_once(readme,
              "El producto está en etapa pre-productiva. Seguridad/RBAC y Flyway V1-V7 están\nintegrados; la liquidación financiera por vigencia, la demo interna, staging,\nbackup/restore y rollback permanecen abiertos. No debe interpretarse el estado\ndel repositorio como autorización de producción.",
              "El producto está en etapa pre-productiva. Seguridad/RBAC, liquidación financiera\npor vigencia, Flyway V1-V7 y la demo interna automatizada están integrados.\nGATE-2, recorridos humanos, backup/restore, rollback, observabilidad, staging y\nproducción permanecen abiertos; el repositorio no constituye autorización de despliegue.")
          replace_once(readme,
              "La etapa pendiente de liquidación por vigencia debe conectar tarifas y\ncondiciones históricas con `cargo_liquidaciones` y retirar del cálculo los\ncampos legacy. Ver\n[Etapa 1B](docs/codex/gestudio-release-hardening/04_ETAPA_1B_LIQUIDACION_FINANCIERA.md).",
              "La liquidación por vigencia está integrada: mensualidades y matrículas resuelven\ntarifas históricas y condiciones efectivas, persisten `cargo_liquidaciones` de\nforma atómica y rechazan fuentes legacy. Ver [cierre de GATE-1B](docs/codex/gestudio-release-hardening/15_CIERRE_GATE_1B_2026-07-20.md).")

          demo_local = Path("docs/testing/demo-local.md")
          demo_local_text = demo_local.read_text(encoding="utf-8-sig").replace("Flyway V1-V6", "Flyway V1-V7")
          demo_local.write_text(demo_local_text, encoding="utf-8")

          demo_seed = Path("docs/testing/demo-seed.md")
          demo_seed_text = demo_seed.read_text(encoding="utf-8-sig")
          demo_seed_text = demo_seed_text.replace("| Última versión Flyway auditada | `6` |", "| Última versión Flyway auditada | `7` |")
          demo_seed_text = demo_seed_text.replace("| Migración productiva más reciente auditada | `V6__rbac_permission_catalog_and_base_roles.sql` |", "| Migración productiva más reciente auditada | `V7__jere_platform_student_source_exports.sql` |")
          demo_seed_text = demo_seed_text.replace("- la última migración productiva continúe incluyendo V6;", "- la última migración productiva continúe incluyendo V7;")
          demo_seed_text = demo_seed_text.replace("9. exige V6 exitosa y ninguna migración demo;", "9. exige V7 exitosa, V6 presente y ninguna migración demo;")
          demo_seed_text += "\n\n## Actualización operativa 2026-07-20\n\nEl gate actual exige Flyway V1-V7. V6 continúa siendo la autoridad del catálogo RBAC y V7 agrega únicamente snapshots firmados de integración, deshabilitados por defecto. El seed no inserta datos en las tablas V7 y verifica que existan antes de operar.\n"
          demo_seed.write_text(demo_seed_text, encoding="utf-8")

          handoff = Path("docs/project-status-and-handoff.md")
          handoff_text = handoff.read_text(encoding="utf-8-sig")
          handoff_text += "\n\n## Reconciliación de release gates\n\n- GATE-1B permanece cerrado e integrado en `main` desde `ef4f9c31dab9a3dfce43f913177089f80ae0205a`.\n- El emisor V7 no habilita despliegue ni transporte automático.\n- La integración multi-página sigue bloqueada externamente por `JerePrograma/jere-platform#59`; Gestudio sólo materializa y expone artefactos administrativos con la función deshabilitada por defecto.\n- Smoke, seed, documentación y scripts deben validar V1-V7 antes de fusionar PR #15.\n"
          handoff.write_text(handoff_text, encoding="utf-8")

      - name: Commit fixes
        shell: bash
        run: |
          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md scripts/smoke-local.ps1 scripts/gestudio_demo_seed_full.sql docs/testing/demo-local.md docs/testing/demo-seed.md docs/project-status-and-handoff.md
          git commit -m "fix(release): reconcilia smoke y seed con Flyway V7"
          git push origin HEAD:feature/signed-student-source-export-v1
