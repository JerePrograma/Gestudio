name: Fix PR15 smoke final once

on:
  pull_request:
    branches: [main]

permissions:
  contents: write

jobs:
  fix:
    if: github.event.pull_request.head.ref == 'feature/signed-student-source-export-v1'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR head
        uses: actions/checkout@v4
        with:
          ref: feature/signed-student-source-export-v1
          fetch-depth: 0
      - name: Patch final Flyway assertion
        shell: python
        run: |
          from pathlib import Path
          path = Path('scripts/smoke-local.ps1')
          text = path.read_text(encoding='utf-8-sig')
          old = 'SELECT count(*) FROM flyway_schema_history WHERE NOT success OR version::int NOT BETWEEN 1 AND 6'
          new = 'SELECT count(*) FROM flyway_schema_history WHERE NOT success OR version::int NOT BETWEEN 1 AND 7'
          if old not in text:
              if new not in text:
                  raise SystemExit('No se encontró la aserción Flyway final')
          else:
              text = text.replace(old, new, 1)
              path.write_text(text, encoding='utf-8')
      - name: Commit fix
        shell: bash
        run: |
          git diff --check
          git status --short
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/smoke-local.ps1
          git commit -m "fix(testing): valida historial final hasta Flyway V7"
          git push origin HEAD:feature/signed-student-source-export-v1
