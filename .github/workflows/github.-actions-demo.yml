name: CI Gestudio

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: gestudio-${{ github.ref }}
  cancel-in-progress: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Set up Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Verify backend
        working-directory: backend
        env:
          GESTUDIO_HOME: ${{ github.workspace }}
        run: bash ./mvnw -B -ntp clean verify

      - name: Set up Node 22.14.0
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22.14.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        working-directory: frontend
        env:
          VITE_API_BASE_URL: https://example.invalid/api
          VITE_APP_TIME_ZONE: America/Argentina/Buenos_Aires
        run: |
          npm run lint
          npm test
          npm run build

      - name: Validate local Compose
        run: docker compose config --quiet

      - name: Validate production Compose
        env:
          POSTGRES_DB: gestudio_ci
          POSTGRES_USER: gestudio_ci
          POSTGRES_PASSWORD: ci-not-a-production-secret
          BACKEND_IMAGE: example.invalid/gestudio-backend:${{ github.sha }}
          FRONTEND_IMAGE: example.invalid/gestudio-frontend:${{ github.sha }}
          JWT_SECRET: ci-only-jwt-secret-with-at-least-32-characters
          JWT_ISSUER: gestudio-ci
          JWT_ACCESS_TOKEN_HOURS: "2"
          JWT_REFRESH_TOKEN_HOURS: "168"
          SPRING_MAIL_HOST: smtp.example.invalid
          SPRING_MAIL_PORT: "587"
          SPRING_MAIL_USERNAME: ci
          SPRING_MAIL_PASSWORD: ci-not-a-production-secret
          SPRING_MAIL_IMAP_HOST: imap.example.invalid
          SPRING_MAIL_IMAP_PORT: "993"
          SPRING_MAIL_IMAP_USERNAME: ci
          SPRING_MAIL_IMAP_PASSWORD: ci-not-a-production-secret
          APP_TIME_ZONE: America/Argentina/Buenos_Aires
          APP_CORS_ALLOWED_ORIGINS: https://app.example.invalid
          APP_OBSERVABILITY_METRICS_TOKEN: ci-only-independent-metrics-token
          VITE_API_BASE_URL: https://api.example.invalid/api
          VITE_APP_TIME_ZONE: America/Argentina/Buenos_Aires
        run: docker compose -f docker-compose.yml -f docker-compose.prod.yml config --quiet

  build-images:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout verified SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Build backend image gate
        run: docker build --pull -t gestudio-backend:${{ github.sha }} ./backend

      - name: Build frontend image gate
        run: |
          docker build --pull \
            --build-arg VITE_API_BASE_URL=https://example.invalid/api \
            --build-arg VITE_APP_TIME_ZONE=America/Argentina/Buenos_Aires \
            -t gestudio-frontend:${{ github.sha }} \
            ./frontend

  smoke:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout verified SHA
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Run isolated canonical smoke
        shell: pwsh
        run: ./scripts/smoke-local.ps1
