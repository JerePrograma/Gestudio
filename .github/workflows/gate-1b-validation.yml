name: GATE-1B validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-1b-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  validate-all:
    name: Scope All
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Configure Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate backend, frontend and Compose
        shell: pwsh
        run: ./scripts/codex/validate.ps1 -Scope All

      - name: Publish backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco
          if-no-files-found: ignore

      - name: Publish validation sources
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-sources
          path: |
            scripts/smoke-local.ps1
            scripts/validate-demo-seed.ps1
            scripts/codex/validate.ps1
          if-no-files-found: error

  smoke-local:
    name: Smoke local
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute canonical smoke
        shell: pwsh
        run: ./scripts/smoke-local.ps1

  validate-demo-seed:
    name: Demo seed
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate demo seed twice
        shell: pwsh
        run: ./scripts/validate-demo-seed.ps1
