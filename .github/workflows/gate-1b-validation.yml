name: GATE-1B validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gate-1b-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-operational-scripts-once:
    name: Patch operational scripts once
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate-1b-liquidacion-vigencia
          fetch-depth: 0

      - name: Patch scripts deterministically
        shell: python
        run: |
          from pathlib import Path

          smoke = Path("scripts/smoke-local.ps1")
          smoke_source = smoke.read_text(encoding="utf-8-sig")
          smoke_source = smoke_source.replace(
              '[datetime]::new($tarifaBusinessNow.Year, $tarifaBusinessNow.Month, 1)',
              '[datetime]::new($tarifaBusinessNow.Year, 1, 1)',
              1
          )
          smoke.write_text(smoke_source, encoding="utf-8")

          demo = Path("scripts/validate-demo-seed.ps1")
          demo_source = demo.read_text(encoding="utf-8-sig")
          wrapper_marker = '    if (-not $IgnoreDeadline) { Assert-Deadline }'
          wrapper_code = '''
          if (-not $script:isWindowsHost -and [IO.Path]::GetFileName($FilePath) -eq "mvnw") {
              $Arguments = @($FilePath) + $Arguments
              $FilePath = "bash"
          }'''
          if 'GetFileName($FilePath) -eq "mvnw"' not in demo_source:
              marker_index = demo_source.index(wrapper_marker) + len(wrapper_marker)
              demo_source = demo_source[:marker_index] + wrapper_code + demo_source[marker_index:]
          if '"-DskipTests"' not in demo_source:
              raise SystemExit("No se encontró -DskipTests en Build-Backend")
          demo_source = demo_source.replace('"-DskipTests", ', '', 1)
          demo.write_text(demo_source, encoding="utf-8")

      - name: Commit script fixes
        shell: bash
        run: |
          if git diff --quiet -- scripts/smoke-local.ps1 scripts/validate-demo-seed.ps1; then
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/smoke-local.ps1 scripts/validate-demo-seed.ps1
          git commit -m "fix(testing): ejecuta seed y smoke con vigencias efectivas"
          git push origin HEAD:agent/gate-1b-liquidacion-vigencia

  validate-all:
    name: Scope All
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Configure Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate backend, frontend and Compose
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/codex/validate.ps1 -Scope All 2>&1 | Tee-Object -FilePath validation.log
          exit $LASTEXITCODE

      - name: Publish validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log
          if-no-files-found: error

      - name: Publish backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco
          if-no-files-found: ignore

  smoke-local:
    name: Smoke local
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute canonical smoke
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/smoke-local.ps1 2>&1 | Tee-Object -FilePath smoke-local.log
          exit $LASTEXITCODE

      - name: Capture residual Docker resources
        if: always()
        shell: bash
        run: |
          docker ps -a --format '{{.ID}}|{{.Names}}|{{.Status}}' > smoke-docker-resources.log
          docker volume ls --format '{{.Name}}' >> smoke-docker-resources.log

      - name: Publish smoke evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-evidence
          path: |
            smoke-local.log
            smoke-docker-resources.log
          if-no-files-found: error

  validate-demo-seed:
    name: Demo seed
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate demo seed twice
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/validate-demo-seed.ps1 2>&1 | Tee-Object -FilePath demo-seed.log
          exit $LASTEXITCODE

      - name: Capture residual Docker resources
        if: always()
        shell: bash
        run: |
          docker ps -a --format '{{.ID}}|{{.Names}}|{{.Status}}' > demo-docker-resources.log
          docker volume ls --format '{{.Name}}' >> demo-docker-resources.log

      - name: Publish demo evidence
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: demo-seed-evidence
          path: |
            demo-seed.log
            demo-docker-resources.log
          if-no-files-found: error
