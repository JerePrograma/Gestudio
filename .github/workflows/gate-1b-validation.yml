name: GATE-1B validation

on:
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gate-1b-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  patch-smoke-once:
    name: Patch smoke once
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout head branch
        uses: actions/checkout@v4
        with:
          ref: agent/gate-1b-liquidacion-vigencia
          fetch-depth: 0

      - name: Apply deterministic smoke patch
        shell: python
        run: |
          from pathlib import Path

          path = Path("scripts/smoke-local.ps1")
          source = path.read_text(encoding="utf-8-sig")
          if "$tarifaBusinessNow = Get-BusinessNow" in source:
              print("Smoke ya actualizado")
              raise SystemExit(0)

          discipline = '''        $disciplina = (Invoke-Api -Method "POST" -Path "/disciplinas" -Body @{
              nombre = "Disciplina-$suffix"; salonId = $salon.id; profesorId = $profesor.id
              valorCuota = "25.00"; matricula = "10.00"; claseSuelta = "5.00"; clasePrueba = "0.00"; horarios = @()
          } -ExpectedStatus 200).Json
          '''
          tariff = discipline + '''        $tarifaBusinessNow = Get-BusinessNow
          $tarifaVigenteDesde = [datetime]::new($tarifaBusinessNow.Year, $tarifaBusinessNow.Month, 1).ToString("yyyy-MM-dd")
          $tarifa = (Invoke-Api -Method "POST" -Path "/disciplinas/$($disciplina.id)/tarifas" -Body @{
              vigenteDesde = $tarifaVigenteDesde; valorCuota = "25.00"; matricula = "10.00"
              claseSuelta = "5.00"; clasePrueba = "0.00"; motivo = "Tarifa efectiva smoke $suffix"
          } -ExpectedStatus 201).Json
          Assert-Equal -Actual $tarifa.vigenteDesde -Expected $tarifaVigenteDesde -Message "Tarifa inicial sin vigencia efectiva"
          '''
          legacy_request = '''        $inscripcionBody = @{
              id = $null; alumnoId = $alumno.id; disciplinaId = $disciplina.id
              bonificacionId = $null; fechaInscripcion = $today; costoParticular = $null
          }
          '''
          effective_request = '''        $inscripcionBody = @{
              id = $null; alumnoId = $alumno.id; disciplinaId = $disciplina.id
              fechaInscripcion = $today
          }
          '''
          enrollment = '''        $matricula = Invoke-Api -Method "GET" -Path "/matriculas/alumno/$($alumno.id)?anio=$anio" -ExpectedStatus 200
          Assert-Equal -Actual $matricula.Json.estado -Expected "EMITIDA" -Message "Matricula automatica ausente"
          Pass "Inscripcion"
          '''
          financial_assertions = '''        $matricula = Invoke-Api -Method "GET" -Path "/matriculas/alumno/$($alumno.id)?anio=$anio" -ExpectedStatus 200
          Assert-Equal -Actual $matricula.Json.estado -Expected "EMITIDA" -Message "Matricula automatica ausente"
          Assert-Equal -Actual (Invoke-Sql "SELECT count(*) FROM cargo_liquidaciones l JOIN cargos c ON c.id=l.cargo_id LEFT JOIN mensualidades m ON m.id=c.mensualidad_id LEFT JOIN matriculas ma ON ma.id=c.matricula_id WHERE (m.inscripcion_id=$($inscripcion.id) OR ma.alumno_id=$($alumno.id)) AND l.formula_version=1 AND l.origen_precio='TARIFA_HISTORICA'") -Expected "2" -Message "Mensualidad y matricula no tienen snapshots historicos"
          Assert-Equal -Actual (Invoke-Sql "SELECT c.importe_original FROM cargos c JOIN mensualidades m ON m.id=c.mensualidad_id WHERE m.inscripcion_id=$($inscripcion.id) AND m.anio=$anio AND m.mes=$($businessNow.Month)") -Expected "25.00" -Message "Mensualidad no uso tarifa efectiva"
          Assert-Equal -Actual (Invoke-Sql "SELECT c.importe_original FROM cargos c JOIN matriculas m ON m.id=c.matricula_id WHERE m.alumno_id=$($alumno.id) AND m.anio=$anio") -Expected "10.00" -Message "Matricula no uso tarifa efectiva"
          Pass "Inscripcion y liquidacion por vigencia"
          '''

          for expected, replacement, label in [
              (discipline, tariff, "disciplina"),
              (legacy_request, effective_request, "inscripción legacy"),
              (enrollment, financial_assertions, "matrícula")
          ]:
              if expected not in source:
                  raise SystemExit(f"No se encontró el bloque {label}")
              source = source.replace(expected, replacement, 1)

          path.write_text(source, encoding="utf-8")

      - name: Commit smoke patch
        shell: bash
        run: |
          if git diff --quiet -- scripts/smoke-local.ps1; then
            exit 0
          fi
          git diff --check
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add scripts/smoke-local.ps1
          git commit -m "test(smoke): valida tarifas y snapshots efectivos"
          git push origin HEAD:agent/gate-1b-liquidacion-vigencia

  validate-all:
    name: Scope All
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Configure Node 22
        uses: actions/setup-node@v4
        with:
          node-version: "22.14.0"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate backend, frontend and Compose
        shell: pwsh
        run: |
          ./scripts/codex/validate.ps1 -Scope All 2>&1 | Tee-Object -FilePath validation.log
          exit $LASTEXITCODE

      - name: Publish validation log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: validation-log
          path: validation.log
          if-no-files-found: ignore

      - name: Publish backend test reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: backend-test-reports
          path: |
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco
          if-no-files-found: ignore

  smoke-local:
    name: Smoke local
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Execute canonical smoke
        shell: pwsh
        run: ./scripts/smoke-local.ps1

  validate-demo-seed:
    name: Demo seed
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate demo seed twice
        shell: pwsh
        run: ./scripts/validate-demo-seed.ps1
