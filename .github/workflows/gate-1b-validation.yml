name: GATE-1B validation

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: gate-1b-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  environment:
    name: Environment evidence
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Configure Node 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Capture versions and Git state
        shell: bash
        run: |
          set -euo pipefail
          {
            echo "UTC=$(date -u '+%Y-%m-%dT%H:%M:%SZ')"
            echo "America/Argentina/Buenos_Aires=$(TZ=America/Argentina/Buenos_Aires date '+%Y-%m-%dT%H:%M:%S%z')"
            echo "GITHUB_SHA=$GITHUB_SHA"
            echo "GITHUB_HEAD_REF=${GITHUB_HEAD_REF:-}"
            echo "--- git status --short --branch"
            git status --short --branch
            echo "--- git rev-parse HEAD"
            git rev-parse HEAD
            echo "--- git diff --check"
            git diff --check
            echo "--- git"
            git --version
            echo "--- java"
            java -version 2>&1
            echo "--- javac"
            javac -version 2>&1
            echo "--- Maven Wrapper"
            (cd backend && bash ./mvnw -version)
            echo "--- node"
            node --version
            echo "--- npm"
            npm --version
            echo "--- docker"
            docker --version
            echo "--- docker compose"
            docker compose version
            echo "--- PowerShell"
            pwsh --version
          } | tee environment.log

      - name: Publish environment evidence
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: environment-evidence
          path: environment.log
          if-no-files-found: error
          retention-days: 14

  validate-backend:
    name: Scope Backend
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate backend
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/codex/validate.ps1 -Scope Backend 2>&1 | Tee-Object -FilePath validation-backend.log
          exit $LASTEXITCODE

      - name: Publish backend evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: backend-evidence
          path: |
            validation-backend.log
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco
          if-no-files-found: error
          retention-days: 14

  validate-frontend:
    name: Scope Frontend
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure Node 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate frontend
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/codex/validate.ps1 -Scope Frontend 2>&1 | Tee-Object -FilePath validation-frontend.log
          exit $LASTEXITCODE

      - name: Publish frontend evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: frontend-evidence
          path: validation-frontend.log
          if-no-files-found: error
          retention-days: 14

  validate-all:
    name: Scope All
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Configure Node 22
        uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci

      - name: Validate backend, frontend and Compose
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/codex/validate.ps1 -Scope All 2>&1 | Tee-Object -FilePath validation-all.log
          exit $LASTEXITCODE

      - name: Publish all-scope evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: all-scope-evidence
          path: |
            validation-all.log
            backend/target/surefire-reports
            backend/target/failsafe-reports
            backend/target/site/jacoco
          if-no-files-found: error
          retention-days: 14

  smoke-local:
    name: Smoke local
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Execute canonical smoke
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/smoke-local.ps1 2>&1 | Tee-Object -FilePath smoke-local.log
          exit $LASTEXITCODE

      - name: Capture residual Docker resources
        if: always()
        shell: bash
        run: |
          docker ps -a --format '{{.ID}}|{{.Names}}|{{.Status}}' > smoke-docker-resources.log
          docker volume ls --format '{{.Name}}' >> smoke-docker-resources.log

      - name: Publish smoke evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: smoke-evidence
          path: |
            smoke-local.log
            smoke-docker-resources.log
          if-no-files-found: error
          retention-days: 14

  validate-demo-seed:
    name: Demo seed
    needs: validate-all
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Checkout
        uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - name: Configure Java 21
        uses: actions/setup-java@0f481fcb613427c0f801b606911222b5b6f3083a # v5
        with:
          distribution: temurin
          java-version: "21"
          cache: maven
          cache-dependency-path: backend/pom.xml

      - name: Validate demo seed twice
        shell: pwsh
        run: |
          & pwsh -NoProfile -File ./scripts/validate-demo-seed.ps1 2>&1 | Tee-Object -FilePath demo-seed.log
          exit $LASTEXITCODE

      - name: Capture residual Docker resources
        if: always()
        shell: bash
        run: |
          docker ps -a --format '{{.ID}}|{{.Names}}|{{.Status}}' > demo-docker-resources.log
          docker volume ls --format '{{.Name}}' >> demo-docker-resources.log

      - name: Publish demo evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4.6.2
        with:
          name: demo-seed-evidence
          path: |
            demo-seed.log
            demo-docker-resources.log
          if-no-files-found: error
          retention-days: 14
